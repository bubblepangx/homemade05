<script>
"use strict";
const cv=document.getElementById('game'),cx=cv.getContext('2d');
const GW=480,GH=640;let sc=1;
function resize(){
  const mc=document.getElementById('mobile-ctrl');
  const isMob=mc.offsetParent!==null;
  const vh=isMob?window.innerHeight-mc.offsetHeight-8:window.innerHeight;
  sc=Math.min(window.innerWidth/GW,vh/GH);
  cv.width=GW;cv.height=GH;
  cv.style.width=GW*sc+'px';cv.style.height=GH*sc+'px';
}
resize();addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,300));

// ========== AUDIO ==========
const AC=window.AudioContext||window.webkitAudioContext;let ax=null;
function initA(){if(!ax)ax=new AC();if(ax.state==='suspended')ax.resume();}
function mkO(tp,f0,f1,d,v,dl){const t=ax.currentTime+(dl||0),o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.type=tp;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(f1,20),t+d);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(.001,t+d);o.start(t);o.stop(t+d);}
function mkN(d,v,fS,fE){const n=ax.sampleRate*d|0,b=ax.createBuffer(1,n,ax.sampleRate),dt=b.getChannelData(0);for(let i=0;i<n;i++)dt[i]=(Math.random()*2-1)*(1-i/n);const s=ax.createBufferSource(),g=ax.createGain(),f=ax.createBiquadFilter();s.buffer=b;f.type='lowpass';f.frequency.setValueAtTime(fS,ax.currentTime);f.frequency.exponentialRampToValueAtTime(Math.max(fE,20),ax.currentTime+d);s.connect(f);f.connect(g);g.connect(ax.destination);g.gain.setValueAtTime(v,ax.currentTime);g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+d);s.start(ax.currentTime);}
function snd(t){if(!ax)return;try{({shoot(){mkO('square',880,440,.08,.11)},hit(){mkO('square',600,200,.12,.14);mkN(.08,.08,3000,500)},explode(){mkN(.35,.2,2500,80);mkO('sine',160,25,.3,.14)},pDeath(){for(let i=0;i<3;i++)mkO('sawtooth',400-i*100,50,.4,.14,i*.12);mkN(.6,.22,3500,50)},dive(){mkO('sine',1200,300,.25,.07)},clear(){[523,659,784,1047].forEach((f,i)=>mkO('square',f,f*.8,.2,.09,i*.1))},intro(){[330,440,550].forEach((f,i)=>mkO('triangle',f,f*.7,.25,.09,i*.12))},powerup(){mkO('sine',400,1200,.18,.11);mkO('sine',500,1400,.13,.07,.05)},bossHit(){mkO('square',200,80,.18,.11)},eShoot(){mkO('triangle',300,100,.08,.05)},over(){[440,370,311,261].forEach((f,i)=>mkO('sawtooth',f,f*.5,.35,.09,i*.25))},coin(){mkO('square',1200,1800,.07,.09);mkO('square',1800,2400,.07,.07,.07)},bonusClear(){[660,880,1100,1320,1760].forEach((f,i)=>mkO('sine',f,f*1.1,.18,.07,i*.07))},pokeball(){mkO('sine',600,1400,.13,.09);mkO('triangle',800,1600,.13,.07,.05)},midBoss(){mkO('sawtooth',200,100,.5,.12);mkO('square',150,50,.5,.08,.1);mkN(.3,.1,1500,200)}})[t]();}catch(e){}}

// ========== INPUT ==========
const K={};
document.addEventListener('keydown',e=>{K[e.code]=true;if([' ','Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();if(e.code==='Space'||e.code==='Enter')hStart();});
document.addEventListener('keyup',e=>K[e.code]=false);
// Mobile ㅗ dpad + fire
document.querySelectorAll('[data-k]').forEach(el=>{
  const code=el.dataset.k;
  const on=e=>{e.preventDefault();initA();K[code]=true;if(code==='Space')hStart();};
  const off=e=>{e.preventDefault();K[code]=false;};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ========== GAME STATE ==========
const ST={TITLE:0,PLAY:1,OVER:2,INTRO:3,RSP:4,CLR:5,WIN:6,BONUS:7,MIDBOSS:8};
let gs=ST.TITLE,score=0,hi=30000,lives=6,stage=1,fc=0;
let stgT=0,rspT=0,goT=0,clrT=0;
let fireLv=0,stgFD=false,mega=false;
let bCoins=[],bTimer=0,bTotal=0,bGot=0,bType='silver';
let s1=[],s2=[],s3=[];
function mkS(){s1=[];s2=[];s3=[];for(let i=0;i<40;i++)s1.push({x:Math.random()*GW,y:Math.random()*GH});for(let i=0;i<30;i++)s2.push({x:Math.random()*GW,y:Math.random()*GH});for(let i=0;i<15;i++)s3.push({x:Math.random()*GW,y:Math.random()*GH});}
mkS();
let neb=[];function mkN2(){neb=[];for(let i=0;i<8;i++)neb.push({x:Math.random()*GW,y:Math.random()*GH,r:80+Math.random()*120,sp:.1+Math.random()*.3});}mkN2();

let pl={x:GW/2,y:GH-60,w:32,h:24,spd:4.6,alive:true,inv:0};
let bul=[],ebul=[],ens=[],expl=[],pups=[],pts=[];
let canSh=true,shCD=0;
let ef={ox:0,dir:1,mt:0},dvT=0,shk=0;

// Mid-boss state
let mBoss=null; // {x,y,hp,maxHp,phase,timer,alive}

function hStart(){initA();if(gs===ST.TITLE)startGame();else if((gs===ST.OVER||gs===ST.WIN)&&goT<=0)gs=ST.TITLE;}

// ========== GAME LOGIC ==========
function startGame(){score=0;lives=6;stage=1;fireLv=0;mega=false;pl.x=GW/2;pl.y=GH-60;pl.alive=true;pl.inv=0;bul=[];ebul=[];expl=[];pups=[];pts=[];mBoss=null;gs=ST.INTRO;stgT=120;spawnWave();snd('intro');}

function spawnWave(){ens=[];ef={ox:0,dir:1,mt:0};const c=cfg();dvT=200;stgFD=false;mBoss=null;
const sx=100,gx=36,gy=34,ty=60;
const bc=stage>=15?6:stage>=10?5:4;const bx=sx+(8-bc)*gx/2;
for(let i=0;i<bc;i++)ens.push(mkE('boss',bx+i*gx,ty,c.bhp,400,BOSS,28,20));
for(let r=0;r<2;r++)for(let i=0;i<8;i++)ens.push(mkE('butt',sx+i*gx,ty+gy*(1+r),1,160,BUTT,20,20));
const br=stage>=12?3:2;for(let r=0;r<br;r++)for(let i=0;i<8;i++)ens.push(mkE('bee',sx+i*gx,ty+gy*(3+r),1,100,BEE,20,18));
ens.forEach((e,i)=>{e.ed=i*2+(Math.random()*5|0);e.ent=true;e.ey=-40;e.ep=0;});}

function mkE(tp,bx,by,hp,pt,spr,w,h){return{tp,hp,bx,by,x:bx,y:by,w,h,alive:true,hit:false,pt,spr,pxS:2,div:false,dp:0,dt:0,af:0,ed:0,ent:false,ey:-40,ep:0,hs:0};}

function spawnMidBoss(){
  const hp=10+stage*3;
  mBoss={x:GW/2,y:-40,hp,maxHp:hp,phase:0,timer:0,alive:true,w:60,h:40,dir:1,shootT:0};
  snd('midBoss');
}

function shoot(){
  const mx=fireLv>=2?4:fireLv>=1?3:2;
  if(bul.length>=mx||!pl.alive||shCD>0)return;
  if(fireLv===0)bul.push({x:pl.x,y:pl.y-12,w:3,h:12,s:8.1,d:1,vx:0});
  else if(fireLv===1){bul.push({x:pl.x-5,y:pl.y-12,w:3,h:12,s:8.1,d:1,vx:0});bul.push({x:pl.x+5,y:pl.y-12,w:3,h:12,s:8.1,d:1,vx:0});}
  else{bul.push({x:pl.x,y:pl.y-14,w:4,h:14,s:8.6,d:2,vx:0,big:true});bul.push({x:pl.x-8,y:pl.y-10,w:3,h:12,s:8.1,d:1,vx:-1});bul.push({x:pl.x+8,y:pl.y-10,w:3,h:12,s:8.1,d:1,vx:1});}
  shCD=6;snd(fireLv>=2?'explode':'shoot');
}
function shootB(){if(bul.length<3&&pl.alive&&shCD<=0){bul.push({x:pl.x,y:pl.y-12,w:3,h:12,s:8.1,d:1});shCD=6;snd('shoot');}}
function eShoot(ex,ey){const c=cfg(),dx=pl.x-ex,dy=pl.y-ey;if(dy<=0)return;const d=Math.sqrt(dx*dx+dy*dy)||1;const spread=stage<=3?.35:stage<=5?.25:stage<=8?.18:stage<=12?.12:stage<=16?.07:.03;const sx=(Math.random()-.5)*spread*d,sy=(Math.random()-.5)*spread*d*.3;const fx=dx+sx,fy=dy+sy,fd=Math.sqrt(fx*fx+fy*fy)||1;ebul.push({x:ex,y:ey+10,vx:fx/fd*c.ebs,vy:fy/fd*c.ebs});snd('eShoot');}
function boom(x,y,big){const n=big?20:12;for(let i=0;i<n;i++){const a=Math.PI*2/n*i+Math.random()*.3,sp=1+Math.random()*(big?4:2.5);expl.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:20+Math.random()*20,ml:40,c:[Z.Y,Z.O,Z.R,Z.W][Math.random()*4|0],sz:1.5+Math.random()*(big?4:3)});}}
function tryDropFire(x,y){if(stgFD||fireLv>=2)return;const alv=ens.filter(e=>e.alive).length;if(Math.random()<1/(alv+1)||alv<=2){stgFD=true;pups.push({x,y,tp:'fire',vy:1.5,w:16,h:16,life:350,bob:Math.random()*6.28});}}
function tryDropPoke(x,y){if(stage<16||mega)return;const alv=ens.filter(e=>e.alive).length;if(Math.random()<.4/(alv+1))pups.push({x,y,tp:'poke',vy:1.3,w:16,h:16,life:400,bob:Math.random()*6.28});}
function rc(ax2,ay,aw,ah,bx2,by,bw,bh){return ax2-aw/2<bx2+bw/2&&ax2+aw/2>bx2-bw/2&&ay-ah/2<by+bh/2&&ay+ah/2>by-bh/2;}
function bz(p0,p1,p2,t){const u=1-t;return{x:u*u*p0.x+2*u*t*p1.x+t*t*p2.x,y:u*u*p0.y+2*u*t*p1.y+t*t*p2.y};}
function startDive(){const alive=ens.filter(e=>e.alive&&!e.div&&!e.ent);if(!alive.length)return;const c=cfg();for(let d=0;d<c.divers;d++){const av=alive.filter(e=>!e.div);if(!av.length)break;const v=av[Math.random()*av.length|0];v.div=true;v.dp=0;v.dt=0;v.ds=(.008+Math.random()*.005)*c.es;v.hs=0;const my=Math.min(pl.y-80,GH*.65);v.pd=[{x:v.x,y:v.y},{x:v.x+(Math.random()-.5)*220,y:(v.y+my)/2},{x:pl.x+(Math.random()-.5)*120,y:my}];v.pu=[{x:0,y:0},{x:0,y:0},{x:v.bx,y:v.by}];snd('dive');}}
function startBonus(type){bType=type;bCoins=[];bTimer=600;bGot=0;bTotal=type==='gold'?20:25;for(let i=0;i<bTotal;i++)bCoins.push({x:40+Math.random()*(GW-80),y:-30-i*35,vy:1.5+Math.random()*.5,alive:true,val:type==='gold'?200:100,bob:Math.random()*6.28});gs=ST.BONUS;}

// ========== UPDATE ==========
function update(){fc++;const c=cfg(),ss=c.ss;
s1.forEach(s=>{s.y+=.3*ss;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});
s2.forEach(s=>{s.y+=.7*ss;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});
s3.forEach(s=>{s.y+=1.2*ss;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});
neb.forEach(p=>{p.y+=p.sp*ss;if(p.y-p.r>GH){p.y=-p.r;p.x=Math.random()*GW;}});
if(shk>.5)shk*=.9;else shk=0;
expl.forEach(e=>{e.x+=e.vx;e.y+=e.vy;e.vx*=.96;e.vy*=.96;e.l--;});expl=expl.filter(e=>e.l>0);
pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.l--;});pts=pts.filter(p=>p.l>0);

// Player input helper
function doMove(){
  if(K.ArrowLeft||K.a)pl.x-=pl.spd;if(K.ArrowRight||K.d)pl.x+=pl.spd;
  if(K.ArrowUp||K.w)pl.y-=pl.spd*.6;if(K.ArrowDown||K.s)pl.y+=pl.spd*.6;
  pl.x=Math.max(16,Math.min(GW-16,pl.x));pl.y=Math.max(GH*.5,Math.min(GH-30,pl.y));
}

// BONUS
if(gs===ST.BONUS){bTimer--;if(pl.alive){doMove();if(K.Space){if(canSh){shootB();canSh=false;}}else canSh=true;if(shCD>0)shCD--;}
bul.forEach(b=>b.y-=b.s);bul=bul.filter(b=>b.y>-10);
bCoins.forEach(co=>{if(!co.alive)return;co.y+=co.vy;co.bob+=.08;});
bul.forEach(b=>{bCoins.forEach(co=>{if(!co.alive)return;if(rc(b.x,b.y,3,12,co.x,co.y,14,14)){co.alive=false;b.y=-100;bGot++;score+=co.val;snd('coin');for(let i=0;i<6;i++){const a=Math.PI*2/6*i;pts.push({x:co.x,y:co.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,l:15,ml:15,c:bType==='gold'?Z.Y:'#CCC',sz:2,tp:'p'});}}});});
if(bTimer<=0||bCoins.every(c2=>!c2.alive||c2.y>GH+20)){if(bGot>=bTotal){score+=bType==='gold'?5000:2000;snd('bonusClear');}gs=ST.INTRO;stgT=120;bul=[];spawnWave();snd('intro');}return;}

if(gs===ST.INTRO){stgT--;if(stgT<=0){if(c.midBoss&&!mBoss){spawnMidBoss();gs=ST.MIDBOSS;}else gs=ST.PLAY;}return;}
