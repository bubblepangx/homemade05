const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const GW=480,GH=640;let scale=1;
const isMobile=('ontouchstart'in window)||(navigator.maxTouchPoints>0);
const padEl=document.getElementById('pad');
const padKeys={};
function resize(){const vw=innerWidth,vh=innerHeight;const padH=isMobile?116:0;const availH=vh-padH;scale=Math.min(vw/GW,availH/GH);canvas.width=GW;canvas.height=GH;canvas.style.width=GW*scale+'px';canvas.style.height=GH*scale+'px';if(isMobile){padEl.style.display='flex';padEl.style.width=Math.min(GW*scale,vw)+'px';}}
resize();addEventListener('resize',resize);addEventListener('orientationchange',()=>setTimeout(resize,200));
if(isMobile){function setupBtn(id,key){const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();padKeys[key]=true;initAudio();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();padKeys[key]=false;},{passive:false});el.addEventListener('touchcancel',e=>{padKeys[key]=false;});}
setupBtn('bl','ArrowLeft');setupBtn('br','ArrowRight');setupBtn('bu','ArrowUp');setupBtn('bd','ArrowDown');setupBtn('bfire','fire');}

// ==================== AUDIO ====================
const AC=window.AudioContext||window.webkitAudioContext;let ax=null;
function initAudio(){if(!ax)ax=new AC();if(ax.state==='suspended')ax.resume();}
function mkO(tp,f0,f1,dur,vol,dly){const t=ax.currentTime+(dly||0),o=ax.createOscillator(),g=ax.createGain();o.connect(g);g.connect(ax.destination);o.type=tp;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(f1,20),t+dur);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur);}
function mkN(dur,vol,fS,fE){const n=ax.sampleRate*dur|0,b=ax.createBuffer(1,n,ax.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);const s=ax.createBufferSource(),g=ax.createGain(),f=ax.createBiquadFilter();s.buffer=b;f.type='lowpass';f.frequency.setValueAtTime(fS,ax.currentTime);f.frequency.exponentialRampToValueAtTime(Math.max(fE,20),ax.currentTime+dur);s.connect(f);f.connect(g);g.connect(ax.destination);g.gain.setValueAtTime(vol,ax.currentTime);g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+dur);s.start(ax.currentTime);}
function snd(t){if(!ax)return;try{({shoot(){mkO('square',880,440,.08,.12)},hit(){mkO('square',600,200,.12,.15);mkN(.1,.1,3000,500)},explode(){mkN(.35,.2,2000,100);mkO('sine',150,30,.3,.15)},pDeath(){for(let i=0;i<3;i++)mkO('sawtooth',400-i*100,50,.4,.15,i*.12);mkN(.6,.25,3000,60)},dive(){mkO('sine',1200,300,.3,.08)},clear(){[523,659,784,1047].forEach((f,i)=>mkO('square',f,f*.8,.25,.1,i*.12))},intro(){[330,440,550].forEach((f,i)=>mkO('triangle',f,f*.7,.3,.1,i*.15))},powerup(){mkO('sine',400,1200,.2,.12);mkO('sine',500,1400,.15,.08,.05)},bossHit(){mkO('square',200,80,.2,.12)},eShoot(){mkO('triangle',300,100,.1,.06)},over(){[440,370,311,261].forEach((f,i)=>mkO('sawtooth',f,f*.5,.4,.1,i*.3))},coin(){mkO('square',1200,1800,.08,.1);mkO('square',1800,2400,.08,.08,.08)},bonusClear(){[660,880,1100,1320,1760].forEach((f,i)=>mkO('sine',f,f*1.1,.2,.08,i*.08))},pokeball(){mkO('sine',600,1400,.15,.1);mkO('triangle',800,1600,.15,.08,.05);mkO('square',1000,1800,.1,.06,.1)}})[t]();}catch(e){}}

// ==================== GAME LOGIC ====================
function startGame(){score=0;lives=6;stage=1;fireLv=0;megaShield=false;pl.x=GW/2;pl.y=GH-60;pl.alive=true;pl.inv=0;bul=[];ebul=[];expl=[];pups=[];pts=[];gs=ST.INTRO;stgT=120;spawnFormation();snd('intro');}
function spawnFormation(){ens=[];ef={ox:0,dir:1,mt:0};const c=cfg();diveT=180;stgFireDrop=false;const sx=100,gx=36,gy=34,ty=60;const bc=stage>=15?6:stage>=10?5:4;const bx=sx+(8-bc)*gx/2;for(let i=0;i<bc;i++)ens.push(mkE('boss',bx+i*gx,ty,c.bhp,400,BOSS,28,20));for(let r=0;r<2;r++)for(let i=0;i<8;i++)ens.push(mkE('butt',sx+i*gx,ty+gy*(1+r),1,160,BUTT,20,20));const br=stage>=12?3:2;for(let r=0;r<br;r++)for(let i=0;i<8;i++)ens.push(mkE('bee',sx+i*gx,ty+gy*(3+r),1,100,BEE,20,18));ens.forEach((e,i)=>{e.ed=i*2+(Math.random()*5|0);e.ent=true;e.ey=-40;e.ep=0;});}
function mkE(tp,bx,by,hp,pt,spr,w,h){return{tp,hp,bx,by,x:bx,y:by,w,h,alive:true,hit:false,pt,spr,pxS:2,div:false,dp:0,dt:0,af:0,ed:0,ent:false,ey:-40,ep:0,hs:0};}

function shoot(){const mx=fireLv>=2?4:fireLv>=1?3:2;if(bul.length>=mx||!pl.alive||shootCD>0)return;if(fireLv===0){bul.push({x:pl.x,y:pl.y-12,w:3,h:12,s:8.1,d:1,vx:0});}else if(fireLv===1){bul.push({x:pl.x-5,y:pl.y-12,w:3,h:12,s:8.1,d:1,vx:0});bul.push({x:pl.x+5,y:pl.y-12,w:3,h:12,s:8.1,d:1,vx:0});}else{bul.push({x:pl.x,y:pl.y-14,w:4,h:14,s:8.6,d:2,vx:0,big:true});bul.push({x:pl.x-8,y:pl.y-10,w:3,h:12,s:8.1,d:1,vx:-1});bul.push({x:pl.x+8,y:pl.y-10,w:3,h:12,s:8.1,d:1,vx:1});}shootCD=8;snd(fireLv>=2?'explode':'shoot');}
function shootBonus(){if(bul.length<3&&pl.alive&&shootCD<=0){bul.push({x:pl.x,y:pl.y-12,w:3,h:12,s:8.1,d:1});shootCD=8;snd('shoot');}}
function eShoot(ex,ey){const c=cfg(),dx=pl.x-ex,dy=pl.y-ey;if(dy<=0)return;const d=Math.sqrt(dx*dx+dy*dy)||1;ebul.push({x:ex,y:ey+10,vx:dx/d*c.ebs,vy:dy/d*c.ebs});snd('eShoot');}
function boom(x,y,big){const n=big?20:12;for(let i=0;i<n;i++){const a=Math.PI*2/n*i+Math.random()*.3,sp=1+Math.random()*(big?4:2.5);expl.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:20+Math.random()*20,ml:40,c:[Z.Y,Z.O,Z.R,Z.W][Math.random()*4|0],sz:1.5+Math.random()*(big?4:3)});}}
function tryDropFire(x,y){if(stgFireDrop||fireLv>=2)return;const alv=ens.filter(e=>e.alive).length;if(Math.random()<1/(alv+1)||alv<=2){stgFireDrop=true;pups.push({x,y,tp:'fire',vy:1.5,w:16,h:16,life:350,bob:Math.random()*6.28});}}
function tryDropPoke(x,y){if(stage<16||megaShield)return;const alv=ens.filter(e=>e.alive).length;if(Math.random()<.4/(alv+1))pups.push({x,y,tp:'poke',vy:1.3,w:16,h:16,life:400,bob:Math.random()*6.28});}
function rc(ax,ay,aw,ah,bx,by,bw,bh){return ax-aw/2<bx+bw/2&&ax+aw/2>bx-bw/2&&ay-ah/2<by+bh/2&&ay+ah/2>by-bh/2;}
function bz(p0,p1,p2,t){const u=1-t;return{x:u*u*p0.x+2*u*t*p1.x+t*t*p2.x,y:u*u*p0.y+2*u*t*p1.y+t*t*p2.y};}
function startDive(){const alive=ens.filter(e=>e.alive&&!e.div&&!e.ent);if(!alive.length)return;const c=cfg(),cnt=stage>=16?3:stage>=10?2:1;for(let d=0;d<cnt;d++){const av=alive.filter(e=>!e.div);if(!av.length)break;const v=av[Math.random()*av.length|0];v.div=true;v.dp=0;v.dt=0;v.ds=(.008+Math.random()*.005)*c.es;v.hs=0;const my=Math.min(pl.y-80,GH*.65);v.pd=[{x:v.x,y:v.y},{x:v.x+(Math.random()-.5)*220,y:(v.y+my)/2},{x:pl.x+(Math.random()-.5)*120,y:my}];v.pu=[{x:0,y:0},{x:0,y:0},{x:v.bx,y:v.by}];snd('dive');}}
function startBonusStage(type){bonusCoinType=type;bonusCoins=[];bonusTimer=600;bonusGot=0;bonusTotal=type==='gold'?20:25;for(let i=0;i<bonusTotal;i++)bonusCoins.push({x:40+Math.random()*(GW-80),y:-30-i*35,vy:1.5+Math.random()*.5,alive:true,val:type==='gold'?200:100,bob:Math.random()*6.28});gs=ST.BONUS;}

// ==================== UPDATE ====================
function update(){fc++;const c=cfg(),ss=c.ss;
s1.forEach(s=>{s.y+=.3*ss;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});s2.forEach(s=>{s.y+=.7*ss;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});s3.forEach(s=>{s.y+=1.2*ss;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});neb.forEach(p=>{p.y+=p.sp*ss;if(p.y-p.r>GH){p.y=-p.r;p.x=Math.random()*GW;}});if(shake>.5)shake*=.9;else shake=0;expl.forEach(e=>{e.x+=e.vx;e.y+=e.vy;e.vx*=.96;e.vy*=.96;e.l--;});expl=expl.filter(e=>e.l>0);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.l--;});pts=pts.filter(p=>p.l>0);

if(gs===ST.BONUS){bonusTimer--;if(pl.alive){if(K.ArrowLeft||K.a||padKeys.ArrowLeft)pl.x-=pl.spd;if(K.ArrowRight||K.d||padKeys.ArrowRight)pl.x+=pl.spd;if(K[' ']||padKeys.fire){if(canShoot){shootBonus();canShoot=false;}}else canShoot=true;if(!isMobile&&tch&&tx!==null){const d=tx-pl.x;if(Math.abs(d)>3)pl.x+=Math.sign(d)*Math.min(Math.abs(d)*.15,pl.spd);shootBonus();}pl.x=Math.max(16,Math.min(GW-16,pl.x));if(shootCD>0)shootCD--;}bul.forEach(b=>b.y-=b.s);bul=bul.filter(b=>b.y>-10);bonusCoins.forEach(co=>{if(!co.alive)return;co.y+=co.vy;co.bob+=.08;});bul.forEach(b=>{bonusCoins.forEach(co=>{if(!co.alive)return;if(rc(b.x,b.y,3,12,co.x,co.y,14,14)){co.alive=false;b.y=-100;bonusGot++;score+=co.val;snd('coin');for(let i=0;i<6;i++){const a=Math.PI*2/6*i;pts.push({x:co.x,y:co.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,l:15,ml:15,c:bonusCoinType==='gold'?Z.Y:'#CCC',sz:2,tp:'p'});}}});});if(bonusTimer<=0||bonusCoins.every(c2=>!c2.alive||c2.y>GH+20)){if(bonusGot>=bonusTotal){score+=bonusCoinType==='gold'?5000:2000;snd('bonusClear');}gs=ST.INTRO;stgT=120;bul=[];spawnFormation();snd('intro');}return;}

if(gs===ST.INTRO){stgT--;if(stgT<=0)gs=ST.PLAY;return;}
if(gs===ST.CLR){clrT--;if(clrT<=0){if(stage===7){stage++;startBonusStage('silver');return;}if(stage===15){stage++;startBonusStage('gold');return;}stage++;if(stage>20){gs=ST.WIN;goT=180;snd('clear');return;}mkNeb();gs=ST.INTRO;stgT=120;bul=[];ebul=[];pups=[];spawnFormation();snd('intro');}return;}
if(gs===ST.RSP){rspT--;if(rspT<=0){pl.alive=true;pl.inv=120;pl.x=GW/2;gs=ST.PLAY;}return;}
if(gs===ST.OVER||gs===ST.WIN){goT--;return;}
if(gs!==ST.PLAY)return;

if(pl.alive){if(K.ArrowLeft||K.a||padKeys.ArrowLeft)pl.x-=pl.spd;if(K.ArrowRight||K.d||padKeys.ArrowRight)pl.x+=pl.spd;if(K.ArrowUp||K.w||padKeys.ArrowUp)pl.y-=pl.spd*.6;if(K.ArrowDown||K.s||padKeys.ArrowDown)pl.y+=pl.spd*.6;if(K[' ']||padKeys.fire){if(canShoot){shoot();canShoot=false;}}else canShoot=true;if(!isMobile&&tch&&tx!==null){const d=tx-pl.x;if(Math.abs(d)>3)pl.x+=Math.sign(d)*Math.min(Math.abs(d)*.15,pl.spd);if(canShoot){shoot();canShoot=false;}if(bul.length<2)canShoot=true;}pl.x=Math.max(16,Math.min(GW-16,pl.x));pl.y=Math.max(GH*.5,Math.min(GH-30,pl.y));if(pl.inv>0)pl.inv--;if(shootCD>0)shootCD--;}

bul.forEach(b=>{b.y-=b.s;if(b.vx)b.x+=b.vx;});bul=bul.filter(b=>b.y>-10&&b.x>-10&&b.x<GW+10);
ebul.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});ebul=ebul.filter(b=>b.y<GH+10&&b.x>-10&&b.x<GW+10);
ef.mt++;if(ef.mt>2){ef.mt=0;ef.ox+=ef.dir;if(Math.abs(ef.ox)>30)ef.dir*=-1;}

ens.forEach(e=>{if(!e.alive)return;e.af=(e.af||0)+.05;if(e.ent){e.ed--;if(e.ed<=0){e.ep+=.03;e.ey=-40+(e.by+40)*Math.min(1,e.ep);if(e.ep>=1){e.ent=false;e.ey=e.by;}}e.x=e.bx+ef.ox;e.y=e.ent?e.ey:e.by;return;}if(e.div){e.dt+=e.ds;if(e.dp===0){if(e.dt<1){const p=bz(e.pd[0],e.pd[1],e.pd[2],e.dt);e.x=p.x;e.y=p.y;const ms=stage>=15?3:stage>=8?2:1;if(e.hs<ms&&e.dt>.25&&Math.random()<.04){eShoot(e.x,e.y);e.hs++;}}else{e.dp=1;e.dt=0;e.pu[0]={x:e.x,y:e.y};e.pu[2]={x:e.bx+ef.ox,y:e.by};e.pu[1]={x:(e.x+e.pu[2].x)/2+(Math.random()-.5)*50,y:Math.min(e.y,e.by)-30};}}else{if(e.dt<1){const p=bz(e.pu[0],e.pu[1],e.pu[2],e.dt);e.x=p.x;e.y=p.y;}else{e.div=false;e.x=e.bx+ef.ox;e.y=e.by;}}}else{e.x=e.bx+ef.ox;e.y=e.by+Math.sin(e.af)*2;}});

diveT--;if(diveT<=0){startDive();diveT=c.dr+(Math.random()*40|0);}
if(Math.random()<c.sr){const sh=ens.filter(e=>e.alive&&!e.div&&!e.ent);if(sh.length)eShoot(sh[Math.random()*sh.length|0].x,sh[Math.random()*sh.length|0].y);}

bul.forEach(b=>{ens.forEach(e=>{if(!e.alive)return;if(rc(b.x,b.y,b.w,b.h,e.x,e.y,e.w,e.h)){e.hp-=(b.d||1);b.y=-999;if(e.hp<=0){e.alive=false;const p=e.pt*(e.div?2:1);score+=p;if(score>hi)hi=score;boom(e.x,e.y,e.tp==='boss');snd(e.tp==='boss'?'explode':'hit');shake=e.tp==='boss'?6:2;pts.push({x:e.x,y:e.y,vx:0,vy:-1,l:40,ml:40,text:''+p,tp:'sc'});tryDropFire(e.x,e.y);if(e.tp==='boss')tryDropPoke(e.x,e.y);}else{e.hit=true;setTimeout(()=>e.hit=false,100);snd('bossHit');}}});});

if(pl.alive&&pl.inv<=0){ebul.forEach(b=>{if(rc(b.x,b.y,4,4,pl.x,pl.y,pl.w,pl.h)){b.y=GH+100;if(megaShield){megaShield=false;pl.inv=60;boom(pl.x,pl.y,false);snd('hit');shake=4;}else pDie();}});ens.forEach(e=>{if(!e.alive)return;if(rc(pl.x,pl.y,pl.w*.7,pl.h*.7,e.x,e.y,e.w*.7,e.h*.7)){e.alive=false;boom(e.x,e.y,false);if(megaShield){megaShield=false;pl.inv=60;snd('hit');shake=4;score+=e.pt;}else pDie();}});}

pups.forEach(p=>{p.y+=p.vy;p.life--;p.bob+=.08;if(pl.alive&&rc(pl.x,pl.y,32,24,p.x,p.y,p.w,p.h)){p.life=0;if(p.tp==='fire'){fireLv=Math.min(fireLv+1,2);snd('powerup');score+=500;pts.push({x:pl.x,y:pl.y,vx:0,vy:-1.5,l:50,ml:50,text:'POWER UP!',tp:'sc',c:Z.Y});for(let i=0;i<12;i++){const a=Math.PI*2/12*i;pts.push({x:pl.x,y:pl.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,l:15,ml:15,c:Z.Y,sz:3,tp:'p'});}}else if(p.tp==='poke'){megaShield=true;snd('pokeball');score+=800;pts.push({x:pl.x,y:pl.y,vx:0,vy:-1.5,l:60,ml:60,text:'MEGA SHIELD!',tp:'sc',c:Z.CC});for(let i=0;i<16;i++){const a=Math.PI*2/16*i;pts.push({x:pl.x,y:pl.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,l:20,ml:20,c:i%2?Z.R:'#FFF',sz:3,tp:'p'});}}}});pups=pups.filter(p=>p.life>0&&p.y<GH+20);

if(!stgFireDrop&&fireLv<2){const alv=ens.filter(e=>e.alive);if(alv.length<=2&&alv.length>0){stgFireDrop=true;pups.push({x:alv[0].x,y:alv[0].y,tp:'fire',vy:1.5,w:16,h:16,life:350,bob:0});}}
if(ens.every(e=>!e.alive)&&gs===ST.PLAY){gs=ST.CLR;clrT=120;score+=1000*stage;if(score>hi)hi=score;snd('clear');}}

function pDie(){pl.alive=false;boom(pl.x,pl.y,true);shake=10;lives--;fireLv=Math.max(0,fireLv-1);megaShield=false;ebul=[];snd('pDeath');if(lives<=0){gs=ST.OVER;goT=180;snd('over');}else{gs=ST.RSP;rspT=90;pl.y=GH-60;}}

// ==================== DRAW ====================
function draw(){const c=cfg();ctx.save();if(shake>0)ctx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
const[br,bg,bb]=c.bg;const g=ctx.createLinearGradient(0,0,0,GH);g.addColorStop(0,`rgb(${br},${bg},${bb})`);g.addColorStop(.5,`rgb(${br>>1},${bg>>1},${bb>>1})`);g.addColorStop(1,`rgb(${br*.3|0},${bg*.3|0},${bb*.3|0})`);ctx.fillStyle=g;ctx.fillRect(0,0,GW,GH);
if(c.nb)neb.forEach(p=>{const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);gr.addColorStop(0,c.nb);gr.addColorStop(1,'transparent');ctx.fillStyle=gr;ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);});
ctx.fillStyle=c.sc;ctx.globalAlpha=.3;s1.forEach(s=>ctx.fillRect(s.x,s.y,1,1));ctx.globalAlpha=.6;s2.forEach(s=>ctx.fillRect(s.x,s.y,1.5,1.5));ctx.globalAlpha=1;s3.forEach(s=>{ctx.fillRect(s.x,s.y,2,2);if(Math.sin(fc*.1+s.x)>.8){ctx.globalAlpha=.4;ctx.fillRect(s.x-1,s.y,4,2);ctx.fillRect(s.x,s.y-1,2,4);ctx.globalAlpha=1;}});

// HUD
ctx.font='10px "Press Start 2P",monospace';ctx.textAlign='left';ctx.fillStyle='#F44';ctx.fillText('HIGH',GW-115,18);ctx.fillStyle='#F80';ctx.fillText('SCORE',GW-115,32);ctx.fillStyle='#FFF';ctx.textAlign='right';ctx.fillText(''+hi,GW-15,48);ctx.fillText(''+score,GW-15,72);ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='left';ctx.fillStyle='#888';ctx.fillText('STG '+stage,10,18);if(fireLv>0){ctx.fillStyle=fireLv>=2?'#F44':'#FC0';ctx.fillText('FIRE LV'+fireLv,10,32);}if(megaShield){ctx.fillStyle='#4CF';ctx.fillText('MEGA SHIELD',10,fireLv>0?44:32);}for(let i=0;i<lives-(pl.alive?1:0);i++)drawMini(20+i*22,GH-25);for(let i=0;i<Math.min(stage,10);i++)drawBdg(GW-20-i*18,GH-25);if(stage>10)for(let i=0;i<stage-10;i++)drawBdg(GW-20-i*18,GH-45);

if(gs===ST.TITLE){drawTitle();ctx.restore();return;}
if(gs===ST.BONUS){ctx.font='12px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle=bonusCoinType==='gold'?'#FFD700':'#C0C0C0';ctx.fillText('BONUS STAGE!',GW/2,30);ctx.font='8px "Press Start 2P",monospace';ctx.fillStyle='#FFF';ctx.fillText(bonusCoinType==='gold'?'GOLD COINS!':'SILVER COINS!',GW/2,48);ctx.fillText(bonusGot+'/'+bonusTotal,GW/2,64);ctx.fillStyle='#333';ctx.fillRect(GW/2-80,74,160,6);ctx.fillStyle=bonusTimer>180?'#4F4':bonusTimer>60?'#FC0':'#F44';ctx.fillRect(GW/2-80,74,160*(bonusTimer/600),6);bonusCoins.forEach(co=>{if(!co.alive||co.y>GH+20)return;const bx=co.x+Math.sin(co.bob)*3;ctx.save();const gr=ctx.createRadialGradient(bx,co.y,0,bx,co.y,12);gr.addColorStop(0,bonusCoinType==='gold'?'rgba(255,215,0,.3)':'rgba(192,192,192,.3)');gr.addColorStop(1,'transparent');ctx.fillStyle=gr;ctx.fillRect(bx-12,co.y-12,24,24);ctx.fillStyle=bonusCoinType==='gold'?'#FFD700':'#C0C0C0';ctx.beginPath();ctx.arc(bx,co.y,7,0,Math.PI*2);ctx.fill();ctx.fillStyle=bonusCoinType==='gold'?'#FFA500':'#888';ctx.beginPath();ctx.arc(bx,co.y,5,0,Math.PI*2);ctx.fill();ctx.fillStyle=bonusCoinType==='gold'?'#FFD700':'#DDD';ctx.font='6px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText(bonusCoinType==='gold'?'G':'S',bx,co.y+2);ctx.restore();});bul.forEach(b=>{ctx.fillStyle='#FFF';ctx.fillRect(b.x-1,b.y,3,12);ctx.fillStyle='#FC0';ctx.fillRect(b.x,b.y+2,1,8);});if(pl.alive)drawPlayer();drawFX();ctx.restore();return;}
if(gs===ST.INTRO){ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#4CF';ctx.fillText('STAGE '+stage,GW/2,GH/2-10);ctx.font='9px "Press Start 2P",monospace';ctx.fillStyle=c.sc;ctx.fillText(c.lbl,GW/2,GH/2+15);ctx.fillStyle='#888';ctx.fillText('READY',GW/2,GH/2+40);if(pl.alive)drawPlayer();ctx.restore();return;}
if(gs===ST.CLR){ctx.font='14px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#FC0';ctx.fillText('STAGE CLEAR!',GW/2,GH/2);ctx.font='10px "Press Start 2P",monospace';ctx.fillStyle='#FFF';ctx.fillText('+'+(1000*stage)+' BONUS',GW/2,GH/2+30);if(stage===7||stage===15){ctx.fillStyle=stage===15?'#FFD700':'#C0C0C0';ctx.fillText('NEXT: BONUS STAGE!',GW/2,GH/2+55);}if(pl.alive)drawPlayer();ctx.restore();return;}

ens.forEach(e=>{if(!e.alive||(e.ent&&e.ed>0))return;ctx.save();if(e.hit)ctx.globalAlpha=.5;const sw=e.spr[0].length*e.pxS,sh2=e.spr.length*e.pxS;drawPx(e.spr,e.x-sw/2,e.y-sh2/2,e.pxS);ctx.restore();if(e.tp==='boss'&&e.hp>1){const mhp=cfg().bhp,bw=20;ctx.fillStyle='#333';ctx.fillRect(e.x-bw/2,e.y-sh2/2-5,bw,3);ctx.fillStyle='#4F4';ctx.fillRect(e.x-bw/2,e.y-sh2/2-5,bw*(e.hp/mhp),3);}});
bul.forEach(b=>{if(b.big){ctx.fillStyle='#FC0';ctx.fillRect(b.x-2,b.y,4,b.h);ctx.fillStyle='#FFF';ctx.fillRect(b.x-1,b.y,2,b.h);}else{ctx.fillStyle='#FFF';ctx.fillRect(b.x-1,b.y,3,12);ctx.fillStyle='#FC0';ctx.fillRect(b.x,b.y+2,1,8);}});
ebul.forEach(b=>{ctx.fillStyle='#F44';ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FC0';ctx.beginPath();ctx.arc(b.x,b.y,1.5,0,Math.PI*2);ctx.fill();});
pups.forEach(p=>{const pulse=.7+Math.sin(fc*.15)*.3,bx=p.x+Math.sin(p.bob)*3;ctx.save();ctx.globalAlpha=pulse;if(p.tp==='fire'){ctx.fillStyle='#F80';ctx.fillRect(bx-8,p.y-8,16,16);ctx.fillStyle='#FC0';ctx.fillRect(bx-6,p.y-6,12,12);ctx.fillStyle='#FFF';ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillText('F',bx,p.y+3);}else{ctx.fillStyle='#F44';ctx.beginPath();ctx.arc(bx,p.y,8,Math.PI,0);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(bx,p.y,8,0,Math.PI);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(bx-8,p.y-1,16,2);ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(bx,p.y,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(bx,p.y,2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(bx,p.y,1,0,Math.PI*2);ctx.fill();}ctx.restore();const gr=ctx.createRadialGradient(bx,p.y,0,bx,p.y,16);gr.addColorStop(0,p.tp==='fire'?'rgba(255,136,0,.2)':'rgba(255,68,68,.2)');gr.addColorStop(1,'transparent');ctx.fillStyle=gr;ctx.fillRect(bx-16,p.y-16,32,32);});
if(pl.alive)drawPlayer();drawFX();
if(gs===ST.OVER){ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#F44';ctx.fillText('GAME OVER',GW/2,GH/2);ctx.font='10px "Press Start 2P",monospace';ctx.fillStyle='#FFF';ctx.fillText('SCORE: '+score,GW/2,GH/2+30);if(goT<=0&&Math.sin(fc*.08)>0){ctx.fillStyle='#888';ctx.fillText('PRESS SPACE',GW/2,GH/2+60);}}
if(gs===ST.WIN){ctx.font='18px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#FC0';ctx.fillText('VICTORY!',GW/2,GH/2-20);ctx.font='10px "Press Start 2P",monospace';ctx.fillStyle='#FFF';ctx.fillText('ALL 20 STAGES CLEARED!',GW/2,GH/2+15);ctx.fillText('SCORE: '+score,GW/2,GH/2+40);if(goT<=0&&Math.sin(fc*.08)>0){ctx.fillStyle='#888';ctx.fillText('PRESS SPACE',GW/2,GH/2+70);}}
ctx.restore();}

function drawPlayer(){if(pl.inv>0&&(pl.inv/4|0)%2===0)return;if(megaShield){ctx.save();const p=.2+Math.sin(fc*.1)*.1;ctx.strokeStyle=`rgba(68,204,255,${p})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(pl.x,pl.y,22+Math.sin(fc*.08)*2,0,Math.PI*2);ctx.stroke();for(let i=0;i<4;i++){const a=Math.PI*2/4*i+fc*.04;ctx.fillStyle=`rgba(68,204,255,${p*2})`;ctx.beginPath();ctx.arc(pl.x+Math.cos(a)*20,pl.y+Math.sin(a)*20,2,0,Math.PI*2);ctx.fill();}ctx.restore();drawPx(SHIP_BIG,pl.x-18,pl.y-14,2);}else{drawPx(SHIP,pl.x-16,pl.y-12,2);}const f=Math.sin(fc*.4)*2;ctx.fillStyle=Z.O;ctx.fillRect(pl.x-3,pl.y+12,6,4+f);ctx.fillStyle=Z.Y;ctx.fillRect(pl.x-1,pl.y+12,2,6+f);}
function drawFX(){expl.forEach(e=>{ctx.globalAlpha=e.l/e.ml;ctx.fillStyle=e.c;ctx.fillRect(e.x-e.sz/2,e.y-e.sz/2,e.sz,e.sz);});pts.forEach(p=>{ctx.globalAlpha=p.l/p.ml;if(p.tp==='sc'){ctx.font='8px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle=p.c||'#FFF';ctx.fillText(p.text,p.x,p.y);}else{ctx.fillStyle=p.c;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}});ctx.globalAlpha=1;}
function drawTitle(){const t=Date.now()/1000;ctx.font='28px "Press Start 2P",monospace';ctx.textAlign='center';ctx.fillStyle='#440000';ctx.fillText('갤러그',GW/2+2,160+2);ctx.fillStyle='#F44';ctx.fillText('갤러그',GW/2,160);ctx.fillStyle='#F80';ctx.fillText('갤러그',GW/2,159);ctx.font='9px "Press Start 2P",monospace';ctx.fillStyle='#4CF';ctx.fillText('GALLAG SPACE FIGHTER',GW/2,195);ctx.font='8px "Press Start 2P",monospace';ctx.fillStyle='#888';ctx.fillText('20 STAGES + BONUS',GW/2,215);drawPx(BOSS,GW/2-60,250,2);ctx.font='9px "Press Start 2P",monospace';ctx.fillStyle='#FFF';ctx.textAlign='left';ctx.fillText('400 PTS',GW/2-20,267);drawPx(BUTT,GW/2-56,288,2);ctx.fillText('160 PTS',GW/2-20,303);drawPx(BEE,GW/2-56,326,2);ctx.fillText('100 PTS',GW/2-20,341);ctx.textAlign='center';ctx.font='8px "Press Start 2P",monospace';ctx.fillStyle='#F8C';ctx.fillText('DIVE x2 SCORE!',GW/2,373);ctx.fillStyle='#FC0';ctx.fillText('F = FIREPOWER UP',GW/2,391);ctx.fillStyle='#F44';ctx.beginPath();ctx.arc(GW/2-55,406,5,Math.PI,0);ctx.fill();ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(GW/2-55,406,5,0,Math.PI);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(GW/2-60,405,10,2);ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(GW/2-55,406,2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4CF';ctx.fillText('= MEGA SHIELD (STG 16+)',GW/2+10,409);if(Math.sin(t*3)>0){ctx.font='11px "Press Start 2P",monospace';ctx.fillStyle='#FC0';ctx.fillText('PRESS SPACE / TAP',GW/2,460);}ctx.font='8px "Press Start 2P",monospace';ctx.fillStyle='#555';ctx.fillText('\u2190 \u2192 \u2191 \u2193 : MOVE   SPACE : FIRE',GW/2,520);ctx.fillStyle='#333';ctx.fillText('\u00a9 2026 GALLAG',GW/2,600);}
function drawMini(x,y){ctx.fillStyle='#FFF';ctx.beginPath();ctx.moveTo(x,y-6);ctx.lineTo(x-6,y+4);ctx.lineTo(x+6,y+4);ctx.closePath();ctx.fill();ctx.fillStyle='#F80';ctx.fillRect(x-3,y+1,6,3);}
function drawBdg(x,y){ctx.fillStyle='#F80';ctx.beginPath();ctx.moveTo(x,y-6);ctx.lineTo(x-6,y+2);ctx.lineTo(x-3,y+6);ctx.lineTo(x,y+3);ctx.lineTo(x+3,y+6);ctx.lineTo(x+6,y+2);ctx.closePath();ctx.fill();ctx.fillStyle='#FC0';ctx.fillRect(x-2,y-1,4,3);}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
